# https://fly.io/docs/reference/configuration/
#
# Deploy: fly launch --no-deploy && fly deploy
# Set secrets if needed: fly secrets set GITHUB_TOKEN=...

app = "dependency-analysis-mcp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  FASTMCP_HOST = "0.0.0.0"
  # Uncomment for multiple Fly Machines (stateless streamable HTTP):
  # FASTMCP_STATELESS_HTTP = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
